  deploy:
    runs-on: ubuntu-latest
    # needs: build
    steps:
      - name: setup ssh and connect
        env:
          HOST_MACHINE: ${{ secrets.HOST_MACHINE }}
          HOST_ADDRESS: ${{ secrets.HOST_ADDRESS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          printf "%s" "$SSH_PRIVATE_KEY" > PRIVATE_KEY
          chmod 600 PRIVATE_KEY
          ssh -i PRIVATE_KEY -o StrictHostKeyChecking=no $HOST_MACHINE@$HOST_ADDRESS << 'EOF'
            echo "Current directory: "
            pwd
            
            export PATH="/home/ubuntu/.nvm/versions/node/v20.19.0/bin:$PATH"
            
            cd react-express-deployment
            git pull 
            
            echo $(pnpm -v)
          EOF
