name: deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: add pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: build frontend
        run: |
          cd "./frontend"
          pnpm install --frozen-lockfile
          pnpm run build

      - name: build backend
        run: |
          cd "./backend"
          pnpm install --frozen-lockfile
          pnpm run build

      - name: setup ssh
        env:
          TEST_SECRET: ${{ secrets.TEST_SECRET }}
        run: |
          echo TEST_SECRET
