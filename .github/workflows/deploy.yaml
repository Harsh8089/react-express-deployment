name: deploy
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: add pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: build backend
        run: |
          cd backend
          pnpm install --frozen-lockfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: setup ssh and deploy
        env:
          HOST_MACHINE: ${{ secrets.HOST_MACHINE }}
          HOST_ADDRESS: ${{ secrets.HOST_ADDRESS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          printf "%s" "$SSH_PRIVATE_KEY" > PRIVATE_KEY
          chmod 600 PRIVATE_KEY
          ssh -i PRIVATE_KEY -o StrictHostKeyChecking=no $HOST_MACHINE@$HOST_ADDRESS
            source ~/.bashrc  

            if [ -d "/home/ubuntu/react-express-deployment" ]; then
              cd /home/ubuntu/react-express-deployment
              git pull
            else
              git clone https://github.com/Harsh8089/react-express-deployment.git /home/ubuntu/react-express-deployment
              cd /home/ubuntu/react-express-deployment
            fi

            echo $(pnpm -v)
          EOF
